
#  WeedsGalore — Improved Configuration 


project:
  name: "crop_weed_segmentation"
  seed: 42
  device: "cpu"
  num_workers: 0

dataset:
  raw_dir: "data/raw/weedsgalore-dataset"
  processed_dir: "data/processed"
  image_size: 512
  num_classes: 3
  class_names: ["background", "crop", "weed"]
  bands: ["R", "G", "B"]
  ignore_index: 255
  train_ratio: 0.70
  val_ratio:   0.15
  test_ratio:  0.15

augmentation:
  train:
    horizontal_flip: true
    vertical_flip: true
    random_rotation: 45        # increased from 30
    color_jitter:
      brightness: 0.3          # increased from 0.2
      contrast: 0.3            # increased from 0.2
      saturation: 0.3          # increased from 0.2
    gaussian_blur: true        # was false
    normalize:
      mean: [0.485, 0.456, 0.406]
      std:  [0.229, 0.224, 0.225]
  val:
    normalize:
      mean: [0.485, 0.456, 0.406]
      std:  [0.229, 0.224, 0.225]

model:
  encoder:
    name: "resnet50"           
    pretrained: true
    freeze_bn: false
  msfca:
    in_channels: 2048
    out_channels: 512
    kernel_sizes: [5, 11, 17]
    reduction_ratio: 16
  transformer:
    in_channels: 512
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.1
    num_layers: 2
  fusion:
    in_channels: 1024
    out_channels: 512
  unetpp_decoder:
    encoder_channels: [64, 256, 512, 1024, 2048]
    decoder_channels: [256, 128, 64, 32]
    num_classes: 3
  edge_head:
    in_channels: 32
    mid_channels: 32

training:
  epochs: 35                   
  batch_size: 2
  gradient_clip: 1.0
  accumulation_steps: 1
  amp: false

  optimizer:
    name: "adamw"
    lr: 5.0e-5                 # reduced from 1e-4 for better convergence
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_epochs: 3           # increased from 2
    min_lr: 1.0e-6

  loss:
    dice_weight: 0.6           # increased from 0.5
    focal_weight: 0.4          # reduced from 0.5
    edge_weight: 0.4           # increased from 0.3
    focal_gamma: 2.0
    focal_alpha: null
    class_weights: [0.2, 0.4, 0.4]   # upweight crop+weed vs background

evaluation:
  metrics: ["miou", "dice", "precision", "recall", "f1"]
  save_predictions: true

output:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  viz_dir: "outputs/visualizations"
  save_every: 10
  log_every: 5
  tensorboard: true